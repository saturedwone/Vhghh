<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Hercules Universal Cleaner</title>
    <style>
        :root {
            --bg-color: #0f0f13;
            --panel-bg: #1a1a24;
            --primary: #6c5ce7;
            --primary-hover: #5a4bcf;
            --text-main: #e2e2e2;
            --text-muted: #8b8b99;
            --border: #2d2d3d;
            --success: #00b894;
            --error: #d63031;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }

        body {
            background-color: var(--bg-color);
            color: var(--text-main);
            display: flex;
            flex-direction: column;
            align-items: center;
            min-height: 100vh;
            padding: 2rem;
        }

        .header {
            text-align: center;
            margin-bottom: 2rem;
        }

        .header h1 {
            color: var(--primary);
            font-size: 2.5rem;
            text-transform: uppercase;
            letter-spacing: 2px;
        }

        .header p {
            color: var(--text-muted);
            margin-top: 5px;
        }

        .container {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 20px;
            width: 100%;
            max-width: 1200px;
        }

        .panel {
            background-color: var(--panel-bg);
            border: 1px solid var(--border);
            border-radius: 8px;
            padding: 20px;
            display: flex;
            flex-direction: column;
        }

        .panel h2 {
            font-size: 1.2rem;
            margin-bottom: 15px;
            color: var(--text-main);
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        textarea {
            width: 100%;
            height: 400px;
            background-color: #000000;
            color: #00ff00;
            border: 1px solid var(--border);
            border-radius: 4px;
            padding: 15px;
            font-family: 'Courier New', Courier, monospace;
            font-size: 14px;
            resize: none;
            outline: none;
        }

        textarea::placeholder {
            color: #4a4a4a;
        }

        .controls {
            display: flex;
            justify-content: center;
            gap: 15px;
            margin-top: 20px;
            grid-column: 1 / -1;
        }

        button {
            background-color: var(--primary);
            color: white;
            border: none;
            padding: 12px 24px;
            border-radius: 4px;
            font-size: 1rem;
            font-weight: bold;
            cursor: pointer;
            transition: background-color 0.3s ease;
        }

        button:hover {
            background-color: var(--primary-hover);
        }

        .btn-copy {
            background-color: #2d3436;
        }

        .btn-copy:hover {
            background-color: #636e72;
        }

        #status {
            margin-top: 15px;
            text-align: center;
            font-weight: bold;
            grid-column: 1 / -1;
        }

        .success { color: var(--success); }
        .error { color: var(--error); }

        @media (max-width: 768px) {
            .container {
                grid-template-columns: 1fr;
            }
        }
    </style>
</head>
<body>

    <div class="header">
        <h1>Hercules Cleaner</h1>
        <p>Extractor de Loadstrings para Delta y otros ejecutores</p>
    </div>

    <div class="container">
        <div class="panel">
            <h2>Código Ofuscado</h2>
            <textarea id="inputCode" placeholder="Pega el código de Hercules aquí..."></textarea>
        </div>

        <div class="panel">
            <h2>
                Código Limpio
                <button class="btn-copy" onclick="copyToClipboard()">Copiar</button>
            </h2>
            <textarea id="outputCode" readonly placeholder="El loadstring limpio aparecerá aquí..."></textarea>
        </div>

        <div class="controls">
            <button onclick="deobfuscate()">Desofuscar Código</button>
        </div>

        <div id="status"></div>
    </div>

    <script>
        function setStatus(msg, type) {
            const statusEl = document.getElementById('status');
            statusEl.textContent = msg;
            statusEl.className = type;
        }

        function copyToClipboard() {
            const output = document.getElementById('outputCode');
            if (!output.value) return;
            output.select();
            document.execCommand('copy');
            setStatus('¡Código copiado al portapapeles!', 'success');
        }

        function deobfuscate() {
            const input = document.getElementById('inputCode').value;
            const outputEl = document.getElementById('outputCode');
            outputEl.value = '';
            setStatus('Analizando código...', '');

            if (!input.trim()) {
                setStatus('Por favor, pega un código primero.', 'error');
                return;
            }

            // 1. Buscar si la URL está en texto plano (Plaintext)
            const urlRegex = /(https?:\/\/(raw\.githubusercontent\.com|pastebin\.com|github\.com)[^\s"']+)/i;
            const plainMatch = input.match(urlRegex);
            
            if (plainMatch) {
                outputEl.value = `-- URL encontrada en texto plano\nloadstring(game:HttpGet("${plainMatch[1]}"))()`;
                setStatus('¡Éxito! URL extraída directamente.', 'success');
                return;
            }

            // 2. Extraer textos largos y aplicar fuerza bruta para el Cifrado César (Hercules offset)
            const stringRegex = /"([^"]+)"|'([^']+)'/g;
            let strings = [];
            let m;
            while ((m = stringRegex.exec(input)) !== null) {
                let str = m[1] || m[2];
                if (str.length > 20) strings.push(str);
            }

            // Probamos desplazamientos (offsets) del 1 al 30
            for (let s of strings) {
                for (let shift = 1; shift <= 30; shift++) {
                    let decodedForward = "";
                    let decodedBackward = "";
                    
                    // Hercules a veces suma y a veces resta el offset, probamos ambos
                    for (let i = 0; i < s.length; i++) {
                        let code = s.charCodeAt(i);
                        
                        // Hacia adelante
                        if (code >= 48 && code <= 57) {
                            decodedForward += String.fromCharCode(((code - 48 + shift) % 10) + 48);
                        } else if (code >= 65 && code <= 90) {
                            decodedForward += String.fromCharCode(((code - 65 + shift) % 26) + 65);
                        } else if (code >= 97 && code <= 122) {
                            decodedForward += String.fromCharCode(((code - 97 + shift) % 26) + 97);
                        } else {
                            decodedForward += s.charAt(i);
                        }

                        // Hacia atrás
                        if (code >= 48 && code <= 57) {
                            decodedBackward += String.fromCharCode(((code - 48 - shift + 10) % 10) + 48);
                        } else if (code >= 65 && code <= 90) {
                            decodedBackward += String.fromCharCode(((code - 65 - shift + 26) % 26) + 65);
                        } else if (code >= 97 && code <= 122) {
                            decodedBackward += String.fromCharCode(((code - 97 - shift + 26) % 26) + 97);
                        } else {
                            decodedBackward += s.charAt(i);
                        }
                    }

                    if (decodedForward.includes("https://") || decodedForward.includes("github")) {
                        outputEl.value = `-- URL descifrada (Offset +${shift})\nloadstring(game:HttpGet("${decodedForward}"))()`;
                        setStatus(`¡Éxito! URL descifrada con desplazamiento de ${shift}.`, 'success');
                        return;
                    }
                    if (decodedBackward.includes("https://") || decodedBackward.includes("github")) {
                        outputEl.value = `-- URL descifrada (Offset -${shift})\nloadstring(game:HttpGet("${decodedBackward}"))()`;
                        setStatus(`¡Éxito! URL descifrada con desplazamiento inverso de ${shift}.`, 'success');
                        return;
                    }
                }
            }

            // 3. Si no encuentra nada, es posible que sea el método de Diccionario Matemático
            if (input.includes("table.concat") && input.includes("math.")) {
                outputEl.value = "-- Error de extracción automática.\n-- El script parece usar el método de 'Diccionario Matemático' (Ej: azlSnOyuCK[-224+328]).\n-- Este método requiere ejecución manual de matemáticas para resolver.";
                setStatus('No se pudo extraer automáticamente. Ofuscación avanzada detectada.', 'error');
            } else {
                outputEl.value = "-- No se encontró ninguna URL válida.";
                setStatus('Error: No se encontró ningún patrón de Hercules reconocible.', 'error');
            }
        }
    </script>
</body>
</html>
