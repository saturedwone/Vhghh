<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>Satured Hub</title>
<style>
  * { box-sizing: border-box; }
  body {
    margin: 0;
    background: #000;
    color: white;
    font-family: Arial, sans-serif;
    display: flex;
    justify-content: center;
    align-items: center;
    height: 100vh;
    flex-direction: column;
  }
  #loading { font-size: 16px; color: #888; }
  #app {
    display: none;
    flex-direction: column;
    align-items: center;
  }
  input {
    width: 420px;
    padding: 12px;
    text-align: center;
    font-size: 15px;
    border: none;
    margin-bottom: 15px;
    background: #1a1a1a;
    color: white;
    border: 1px solid #333;
  }
  button {
    padding: 10px 30px;
    font-size: 15px;
    cursor: pointer;
    background: #fff;
    color: #000;
    border: none;
  }
  button:hover { background: #ddd; }
  #timer { margin-top: 12px; font-size: 13px; color: #777; }
  #status { margin-bottom: 10px; font-size: 12px; color: #555; }
</style>
</head>
<body>

<div id="loading">Initializing...</div>
<div id="app">
  <div id="status"></div>
  <input id="keyField" readonly />
  <button onclick="copyKey()">Copy</button>
  <div id="timer"></div>
</div>

<script>
// ================= TODAS LAS KEYS =================
const KEYS = `Satured-key-SuRP5ASSRec9hvCd
Satured-key-V02kpm9yBzBQZATT
Satured-key-m3G4N42Mno47hJ0c
Satured-key-DZdYEsxz8XZxYKqG
Satured-key-RvO3FdNSUPGrz2h2
Satured-key-qhdCYufSPZYS3BKg
Satured-key-KoK6z5HwPwJfC8Sb
Satured-key-p06ZUwajjLPLOSHh
Satured-key-xIOhuQDgaFxEzfoA
Satured-key-7VK0Kgv3N77axiVW
Satured-key-cXWtukRaN6dT9bqM
Satured-key-YPuldAZhcDsEIt5u
Satured-key-NWpf3VRhVPojgxpM
Satured-key-6ck4OEZZOaM6gtI7
Satured-key-YIz9XGktzg5EEkhJ
Satured-key-fKWPfaflmRlsn5T4
Satured-key-1zOU22NkkMzARLZT
Satured-key-DzMv5sev0KRiiLKf
Satured-key-8OPlkGKOjInPk8s8
Satured-key-q6n2AZMqIYaJyufo`.trim().split('\n').map(k => k.trim()).filter(k => k);

const DAY = 24 * 60 * 60 * 1000;

// ================= PERSISTENT ID =================
// Usamos una cookie de 1 año para identificar al usuario
// aunque cambie WiFi, cuenta, etc.
function getPersistentUserID() {
  const name = 'satured_uid';
  const cookies = document.cookie.split(';');
  for (let c of cookies) {
    const [k, v] = c.trim().split('=');
    if (k === name) return v;
  }
  // No existe → crear uno nuevo
  const uid = crypto.randomUUID().replace(/-/g, '');
  const expires = new Date(Date.now() + 365 * DAY).toUTCString();
  document.cookie = `${name}=${uid}; expires=${expires}; path=/; SameSite=Lax`;
  return uid;
}

// ================= STORAGE (persiste entre sesiones) =================
async function loadUserData(uid) {
  try {
    const result = await window.storage.get('user_' + uid);
    return result ? JSON.parse(result.value) : null;
  } catch (e) {
    return null;
  }
}

async function saveUserData(uid, data) {
  try {
    await window.storage.set('user_' + uid, JSON.stringify(data));
  } catch (e) {
    console.error('Save error:', e);
  }
}

// ================= LÓGICA PRINCIPAL =================
async function init() {
  const uid = getPersistentUserID();
  let data = await loadUserData(uid);

  if (!data) {
    // Primera vez: asignar key aleatoria
    const key = KEYS[Math.floor(Math.random() * KEYS.length)];
    data = { key: key, created: Date.now() };
    await saveUserData(uid, data);
  } else {
    // Ya existe: revisar si pasaron 24h
    const elapsed = Date.now() - data.created;
    if (elapsed >= DAY) {
      // Renovar key
      const key = KEYS[Math.floor(Math.random() * KEYS.length)];
      data = { key: key, created: Date.now() };
      await saveUserData(uid, data);
    }
    // Si NO pasaron 24h → mantener exactamente igual
  }

  // Mostrar interfaz
  document.getElementById('loading').style.display = 'none';
  document.getElementById('app').style.display = 'flex';
  document.getElementById('keyField').value = data.key;
  document.getElementById('status').innerText = 'ID: ' + uid.slice(0, 8) + '...';

  function updateTimer() {
    const remaining = (data.created + DAY) - Date.now();
    if (remaining <= 0) {
      document.getElementById('timer').innerText = 'Recargando...';
      location.reload();
      return;
    }
    const h = Math.floor(remaining / 3600000);
    const m = Math.floor((remaining % 3600000) / 60000);
    const s = Math.floor((remaining % 60000) / 1000);
    document.getElementById('timer').innerText =
      'Reset in: ' + h + 'h ' + m + 'm ' + s + 's';
  }

  setInterval(updateTimer, 1000);
  updateTimer();
}

function copyKey() {
  navigator.clipboard.writeText(document.getElementById('keyField').value);
}

init();
</script>
</body>
</html>
