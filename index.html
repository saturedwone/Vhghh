// Convert string → array limpio
const KEY_LIST = KEYS.trim().split(/\s+/); 

// ================= CONFIG =================
const DAY = 24 * 60 * 60 * 1000; 

function generateID() { 
    return crypto.randomUUID().replace(/-/g, "").slice(0, 16); 
} 

function getID() { 
    return new URLSearchParams(location.search).get("id"); 
} 

let id = getID(); 

if (!id) {
    // ESTA ES LA WEB PRINCIPAL (SIN ID)
    // Buscamos si ya tiene un clon guardado que no haya expirado
    let lastId = localStorage.getItem("last_clone_id");
    let needsNew = true;

    if (lastId) {
        let stored = localStorage.getItem("clone_" + lastId);
        if (stored) {
            let data = JSON.parse(stored);
            if (Date.now() - data.created < DAY) {
                // No han pasado 24h, lo mandamos a su clon
                needsNew = false;
                location.replace("?id=" + lastId);
            }
        }
    }

    if (needsNew) {
        const newID = generateID(); 
        const key = KEY_LIST[Math.floor(Math.random() * KEY_LIST.length)]; 
        localStorage.setItem("clone_" + newID, JSON.stringify({ key: key, created: Date.now() })); 
        localStorage.setItem("last_clone_id", newID);
        location.replace("?id=" + newID); 
    }
} else { 
    // ESTA ES UNA WEB CLONADA (CON ID)
    const stored = localStorage.getItem("clone_" + id); 
    if (!stored) { 
        document.getElementById("loading").innerText = "Invalid page"; 
    } else { 
        const data = JSON.parse(stored); 
        document.getElementById("loading").style.display = "none"; 
        document.getElementById("app").style.display = "flex"; 
        document.getElementById("keyField").value = data.key; 

        function updateTimer() { 
            const remaining = (data.created + DAY) - Date.now(); 
            if (remaining <= 0) { 
                document.getElementById("timer").innerText = "Expired - new key on next visit"; 
                return; 
            } 
            const h = Math.floor(remaining / 3600000); 
            const m = Math.floor((remaining % 3600000) / 60000); 
            const s = Math.floor((remaining % 60000) / 1000); 
            document.getElementById("timer").innerText = "Reset in: " + h + "h " + m + "m " + s + "s"; 
        } 
        setInterval(updateTimer, 1000); 
        updateTimer(); 
    } 
} 

function copyKey() { 
    navigator.clipboard.writeText(document.getElementById("keyField").value); 
}
