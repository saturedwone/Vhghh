<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Delta Deobfuscator | Ultra Engine V3</title>
    <style>
        :root {
            --bg-base: #050507;
            --bg-panel: #111114;
            --bg-surface: #1c1c21;
            --primary: #a855f7;
            --primary-glow: rgba(168, 85, 247, 0.4);
            --accent: #22c55e;
            --danger: #ef4444;
            --text-main: #fafafa;
            --text-muted: #71717a;
            --border: #27272a;
            --font-mono: 'Fira Code', 'Consolas', monospace;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            background-color: var(--bg-base);
            color: var(--text-main);
            font-family: 'Inter', sans-serif;
            height: 100vh;
            display: flex;
            flex-direction: column;
            overflow: hidden;
        }

        /* Navbar */
        .navbar {
            height: 50px;
            background: var(--bg-panel);
            border-bottom: 1px solid var(--border);
            display: flex;
            align-items: center;
            padding: 0 20px;
            justify-content: space-between;
        }

        .navbar h1 { font-size: 1rem; text-transform: uppercase; letter-spacing: 2px; color: var(--primary); }

        /* Main Layout */
        .container {
            display: flex;
            flex: 1;
            height: calc(100vh - 50px);
        }

        /* Sidebar Controls */
        .sidebar {
            width: 280px;
            background: var(--bg-panel);
            border-right: 1px solid var(--border);
            padding: 20px;
            display: flex;
            flex-direction: column;
            gap: 15px;
        }

        .workspace {
            flex: 1;
            display: flex;
            flex-direction: column;
        }

        .editor-box {
            flex: 1;
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 1px;
            background: var(--border);
        }

        .pane {
            background: var(--bg-base);
            display: flex;
            flex-direction: column;
        }

        .pane-label {
            padding: 8px 15px;
            background: var(--bg-panel);
            font-size: 11px;
            color: var(--text-muted);
            border-bottom: 1px solid var(--border);
        }

        textarea {
            flex: 1;
            background: transparent;
            color: #d1d1d1;
            border: none;
            padding: 15px;
            font-family: var(--font-mono);
            font-size: 13px;
            resize: none;
            outline: none;
            line-height: 1.6;
        }

        #output-code { color: var(--accent); }

        /* Terminal Logs */
        .terminal {
            height: 180px;
            background: #000;
            border-top: 1px solid var(--border);
            padding: 10px 15px;
            overflow-y: auto;
            font-family: var(--font-mono);
            font-size: 12px;
        }

        .log { margin-bottom: 4px; }
        .log.info { color: #3b82f6; }
        .log.success { color: #22c55e; }
        .log.warn { color: #eab308; }
        .log.error { color: #f43f5e; }

        /* Buttons */
        .btn {
            background: var(--bg-surface);
            color: white;
            border: 1px solid var(--border);
            padding: 10px;
            border-radius: 5px;
            cursor: pointer;
            font-weight: bold;
            transition: 0.2s;
        }

        .btn-primary {
            background: var(--primary);
            border: none;
            box-shadow: 0 0 15px var(--primary-glow);
        }

        .btn-primary:hover { opacity: 0.8; transform: translateY(-1px); }

        .btn:active { transform: translateY(0); }

    </style>
</head>
<body>

    <nav class="navbar">
        <h1>Hercules Ultra-Cleaner <span style="color:white">V3</span></h1>
        <div id="engine-status" style="font-size: 11px; color: var(--text-muted);">MOTOR: READY</div>
    </nav>

    <div class="container">
        <aside class="sidebar">
            <p style="font-size: 12px; color: var(--text-muted); margin-bottom: 10px;">CONFIGURACIÓN AVANZADA</p>
            
            <button class="btn btn-primary" onclick="mainEngine()">DESOFUSCAR AHORA</button>
            <button class="btn" onclick="clearAll()">LIMPIAR PANELES</button>
            
            <div style="margin-top: 20px;">
                <p style="font-size: 11px; color: var(--text-muted);">MÉTODOS ACTIVOS:</p>
                <ul style="font-size: 12px; padding-left: 15px; margin-top: 8px; color: #aaa;">
                    <li>Regex Pattern Matching</li>
                    <li>Recursive Math Solver</li>
                    <li>Cesar Brute-Force (30 levels)</li>
                    <li>Anti-Obfuscation Strip</li>
                </ul>
            </div>
        </aside>

        <main class="workspace">
            <div class="editor-box">
                <div class="pane">
                    <div class="pane-label">CÓDIGO SUCIO (PEGAR AQUÍ)</div>
                    <textarea id="input-code" placeholder="Pega el código de Hércules..."></textarea>
                </div>
                <div class="pane">
                    <div class="pane-label">CÓDIGO LIMPIO (RESULTADO)</div>
                    <textarea id="output-code" readonly placeholder="Esperando análisis..."></textarea>
                </div>
            </div>

            <div class="terminal" id="logs">
                <div class="log info">SISTEMA INICIALIZADO...</div>
            </div>
        </main>
    </div>

    <script>
        const logBox = document.getElementById('logs');
        
        function logger(msg, type='info') {
            const div = document.createElement('div');
            div.className = `log ${type}`;
            div.textContent = `[${new Date().toLocaleTimeString()}] ${msg}`;
            logBox.appendChild(div);
            logBox.scrollTop = logBox.scrollHeight;
        }

        function clearAll() {
            document.getElementById('input-code').value = '';
            document.getElementById('output-code').value = '';
            logBox.innerHTML = '<div class="log info">PANELES LIMPIOS.</div>';
        }

        function mainEngine() {
            const input = document.getElementById('input-code').value;
            const output = document.getElementById('output-code');
            
            if(!input.trim()) return logger("ERROR: No hay código para procesar", "error");

            logger("INICIANDO MOTOR ULTRA V3...", "info");
            
            // 1. Limpiar el código de basura de control (Hercules utiliza mucho while false)
            let cleanInput = input.replace(/while\s+false\s+do[\s\S]*?break[\s\S]*?end/g, "");
            cleanInput = cleanInput.replace(/if\s+false\s+then[\s\S]*?end/g, "");
            
            logger("FASE 1: Basura lógica eliminada.");

            let result = null;

            // 2. BUSCAR DICCIONARIO MATEMÁTICO (Caso más común en 1.6.2)
            // Buscamos la tabla: variable = {[index] = "char"}
            const tablePattern = /([a-zA-Z0-9_]+)\s*=\s*\{(\s*\[-?\d+\]\s*=\s*"[^"]+",?\s*)+\}/;
            const tableMatch = cleanInput.match(tablePattern);

            if(tableMatch) {
                const tableName = tableMatch[1];
                logger(`FASE 2: Tabla detectada: ${tableName}. Resolviendo...`, "success");
                
                // Extraer todos los valores de la tabla
                const entries = {};
                const entryPattern = /\[(-?\d+)\]\s*=\s*"([^"]+)"/g;
                let entry;
                while((entry = entryPattern.exec(tableMatch[0])) !== null) {
                    entries[entry[1]] = entry[2];
                }

                // Buscar la cadena de concatenación: tableName[math] .. tableName[math]
                const concatRegex = new RegExp(`${tableName}\\[([^\\]]+)\\]`, 'g');
                let parts = [];
                let m;
                while((m = concatRegex.exec(cleanInput)) !== null) {
                    try {
                        // Resolver la matemática dentro del corchete
                        let expression = m[1].replace(/[^0-9+\-*/()\-]/g, '');
                        let solvedIndex = new Function(`return ${expression}`)();
                        if(entries[solvedIndex]) {
                            parts.push(entries[solvedIndex]);
                        }
                    } catch(e) {}
                }

                if(parts.length > 0) {
                    result = parts.join("");
                }
            }

            // 3. BUSCAR POR FUERZA BRUTA (Caso de Strings cifrados)
            if(!result || !result.includes("http")) {
                logger("FASE 3: Buscando strings cifrados con Offset...", "info");
                const stringPattern = /["']([a-zA-Z0-9\/\:\.\-%_]{30,})["']/g;
                let sMatch;
                while((sMatch = stringPattern.exec(cleanInput)) !== null) {
                    let candidate = sMatch[1];
                    // Probar offsets de 1 a 30
                    for(let i=1; i<=30; i++) {
                        let decoded = attemptCesar(candidate, i);
                        if(decoded.includes("https://")) {
                            result = decoded;
                            logger(`EXITO: Offset ${i} detectado.`, "success");
                            break;
                        }
                    }
                }
            }

            // 4. VERIFICAR RESULTADO
            if(result && (result.includes("http"))) {
                // Si el resultado no tiene el loadstring, se lo ponemos
                if(!result.includes("loadstring")) {
                    result = `loadstring(game:HttpGet("${result}"))()`;
                }
                output.value = result;
                logger("PROCESO COMPLETADO.", "success");
            } else {
                logger("ERROR: No se pudo encontrar el enlace. El código podría estar usando una protección nueva.", "error");
                output.value = "-- No se pudo desofuscar automáticamente.\n-- Verifica si pegaste el código completo.";
            }
        }

        function attemptCesar(str, shift) {
            return str.replace(/[a-zA-Z0-9]/g, (c) => {
                let code = c.charCodeAt(0);
                // Números
                if (code >= 48 && code <= 57) return String.fromCharCode(((code - 48 - shift + 100) % 10) + 48);
                // Mayúsculas
                if (code >= 65 && code <= 90) return String.fromCharCode(((code - 65 - shift + 260) % 26) + 65);
                // Minúsculas
                if (code >= 97 && code <= 122) return String.fromCharCode(((code - 97 - shift + 260) % 26) + 97);
                return c;
            });
        }
    </script>
</body>
</html>
